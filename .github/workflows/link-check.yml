name: Link Check

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    name: Check for broken links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --config .lycheerc.toml
            --no-progress
            --verbose
            --format markdown
            .
          output: lychee-report.md
          fail: false

      - name: Create issue if broken links found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('lychee-report.md', 'utf8');
            const lines = report.split('\n').filter(l => l.includes('[✖]'));
            if (lines.length > 0) {
              const body = `## Broken Links Found\n\n${lines.map(l => `- ${l}`).join('\n')}\n\nSee [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: ['broken-links']
              });
              if (issues.length === 0) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'Broken Links Found',
                  body: body,
                  labels: ['broken-links', 'maintenance']
                });
              }
            }
