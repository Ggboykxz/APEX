name: Stale

on:
  schedule:
    - cron: "30 1 * * *" # Run daily at 01:30 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Manage stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # --- Issue settings ---
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had any activity for 30 days.
            It will be closed in 7 days if no further activity occurs.

            If this issue is still relevant:
            - Add a comment with any updates
            - Remove the `stale` label
            - Add the `keep-open` label if this should remain open

            Thank you for your contributions to APEX!
          close-issue-message: |
            This issue has been automatically closed because it has been stale for 7 days with no activity.

            If you believe this was closed in error, please:
            - Reopen the issue
            - Add a comment with context
            - Add the `keep-open` label to prevent future auto-closure

          # --- PR settings ---
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had any activity for 14 days.
            It will be closed in 7 days if no further activity occurs.

            If this PR is still being worked on:
            - Push new commits or add a comment
            - Remove the `stale` label
            - Add the `keep-open` label if this should remain open

          close-pr-message: |
            This pull request has been automatically closed because it has been stale for 7 days with no activity.

            If you believe this was closed in error, please:
            - Reopen the PR
            - Add a comment with context
            - Add the `keep-open` label to prevent future auto-closure

          # --- Exemptions ---
          exempt-issue-labels: pinned,security,keep-open
          exempt-pr-labels: pinned,security,keep-open
          exempt-milestones: true
          exempt-assignees: true
          exempt-draft-pr: true

          # --- Label configuration ---
          stale-issue-label: stale
          stale-pr-label: stale

          # --- Operation settings ---
          operations-per-run: 30
          remove-stale-when-updated: true
          delete-branch: false
          include-only-assigned: false
