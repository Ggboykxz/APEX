name: TUI

on:
  push:
    branches: [main, dev]
    paths:
      - "tui-frontend/**"
      - ".github/workflows/tui.yml"
  pull_request:
    branches: [main]
    paths:
      - "tui-frontend/**"
      - ".github/workflows/tui.yml"

concurrency:
  group: tui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tui-frontend
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript type check
        run: bunx tsc --noEmit
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tui-frontend
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run linter
        run: bunx eslint . --ext .ts,.tsx
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tui-frontend
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify TUI entry point
        run: |
          test -f src/App.tsx || (echo "ERROR: src/App.tsx not found" && exit 1)
          test -f src/components/ApexApp.tsx || (echo "ERROR: ApexApp.tsx not found" && exit 1)
          test -f src/theme/apex.ts || (echo "ERROR: theme/apex.ts not found" && exit 1)
          test -f src/data/apex-data.ts || (echo "ERROR: data/apex-data.ts not found" && exit 1)
          echo "All TUI source files present"

      - name: Verify all components
        run: |
          for component in ApexApp ChatPanel Sidebar StatusBar; do
            test -f src/components/${component}.tsx || (echo "ERROR: ${component}.tsx not found" && exit 1)
          done
          echo "All 4 TUI components present"

      - name: Verify package integrity
        run: |
          echo "Checking package.json..."
          bun -e "const p = require('./package.json'); console.log('Package:', p.name, 'v' + p.version);"
          echo "TUI package validated"
