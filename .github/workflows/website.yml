name: Website

on:
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tailwind.config.ts"
      - "postcss.config.mjs"
      - "prisma/**"
      - ".github/workflows/website.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tailwind.config.ts"
      - "postcss.config.mjs"
      - "prisma/**"
      - ".github/workflows/website.yml"

concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "file:./test.db"
          NEXT_TELEMETRY_DISABLED: "1"
          NEXTAUTH_SECRET: "build-time-dummy-secret"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_BASE_PATH: "/APEX"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 3
