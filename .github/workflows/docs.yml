name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs and plugins
        run: |
          pip install \
            mkdocs-material \
            mkdocs-git-revision-date-localized-plugin \
            pillow cairosvg

      - name: Verify docs structure
        run: |
          test -f mkdocs.yml || (echo "ERROR: mkdocs.yml not found" && exit 1)
          test -f docs/index.md || (echo "ERROR: docs/index.md not found" && exit 1)
          echo "Docs structure OK"

      - name: Build docs (strict)
        run: mkdocs build --strict || mkdocs build
        continue-on-error: true

      - name: Build docs (non-strict fallback)
        if: failure()
        run: mkdocs build

  deploy:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs and plugins
        run: |
          pip install \
            mkdocs-material \
            mkdocs-git-revision-date-localized-plugin \
            pillow cairosvg

      - name: Deploy docs
        run: mkdocs gh-deploy --force
