name: Markdown Lint

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"

concurrency:
  group: markdown-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-lint:
    name: Lint Markdown files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
          config: .markdownlint.json
