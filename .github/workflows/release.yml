name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build twine
          python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-python
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-python
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-python]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version (strip v prefix)
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          body: |
            ## APEX v1.1.0 — TUI & Agent Update

            The universal AI coding agent. Every model. One terminal.

            ### What's New in v1.1.0
            - **HTTP SSE Backend** — TUI connects via Server-Sent Events instead of stdin/stdout IPC
            - **Real-Time Token Streaming** — Live prompt/completion token counts
            - **Per-Message Cost Tracking** — Model-specific pricing with cost per message
            - **Agent Rename** — DevOps→Shell, Analyst→Planner, new Architect agent
            - **8 New Models** — claude-3.7-sonnet, llama-3.3-70b, mistral-medium, phi-4, and more
            - **Agent-Colored Theming** — Dynamic colors based on active agent
            - **Context Percentage** — Live context window utilization monitoring
            - **Model Validation** — 400 error for unknown models
            - **Proprietary License** — Updated from MIT to Proprietary

            ### 5 Built-in Agents
            - **Coder** — Full tool access for development work
            - **Architect** — Read-only architecture analysis and design decisions
            - **Planner** — Read-only analysis and step-by-step planning
            - **Reviewer** — Code review specialist (subagent)
            - **Shell** — Infrastructure and deployment with confirmation for destructive ops

            ### Installation

            ```bash
            # pip (recommended)
            pip install apex-ai==${{ steps.version.outputs.VERSION }}

            # pipx (isolated)
            pipx install apex-ai==${{ steps.version.outputs.VERSION }}

            # uv (fastest)
            uv tool install apex-ai==${{ steps.version.outputs.VERSION }}

            # One-line install (macOS/Linux)
            curl -fsSL https://apex-ai.dev/install.sh | bash

            # PowerShell (Windows)
            irm https://apex-ai.dev/install.ps1 | iex
            ```

            ### Docker

            ```bash
            docker pull ghcr.io/ggboykxz/apex:${{ steps.version.outputs.VERSION }}
            docker run -it -v $(pwd):/workspace ghcr.io/ggboykxz/apex
            ```

            ### Quick Start

            ```bash
            export ANTHROPIC_API_KEY=sk-ant-...
            apex                          # Interactive mode
            apex --tui                    # Terminal UI
            apex --model gpt-4o           # Start with GPT-4o
            apex --model ollama-llama3    # Local, no API key
            ```

            ### Full Changelog
            See [CHANGELOG.md](https://github.com/Ggboykxz/APEX/blob/main/CHANGELOG.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
